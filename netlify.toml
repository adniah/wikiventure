[build]
  publish = "wikiventure-frontend/dist"
  command = "cd wikiventure-frontend && npm run build"

[functions]
  directory = "wikiventure-frontend/netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200